<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        img {
            width: 300px;
            border-radius: 10px;
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
            color: #333;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Welcome!</h1>

    <img src="https://picsum.photos/300" alt="Random Image">

    <div id="message">This is some text on the page.</div>

    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.getElementById("message").textContent = "You clicked the button!";
        }
    </script>

</body>
</html>
